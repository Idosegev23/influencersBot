<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #F8F7F3; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const PAL = [
  [219,234,254], [208,250,254], [243,232,255], [253,231,244],
  [242,233,189], [220,252,232], [255,238,213], [255,226,227],
];

const NUCLEI = [
  { r: 0.310, or: 0.000, os: 0.000, ph: 0.00, oe: 1.0 },
  { r: 0.255, or: 0.072, os: 0.182, ph: 0.00, oe: 0.75 },
  { r: 0.235, or: 0.088, os: 0.140, ph: 2.09, oe: 0.60 },
  { r: 0.245, or: 0.065, os: 0.218, ph: 4.19, oe: 0.85 },
  { r: 0.220, or: 0.054, os: 0.165, ph: 1.05, oe: 0.70 },
];

const LIGHTS = PAL.map((col, i) => ({
  col,
  or:  0.07 + (i % 4) * 0.035,
  os:  0.072 + i * 0.011,
  ph:  (i / 8) * Math.PI * 2,
  oe:  0.5 + (i % 3) * 0.22,
  sy:  0.068 + i * 0.009,
  sph: i * 0.77,
}));

const off  = document.createElement('canvas');
const octx = off.getContext('2d');
let imgData = null, prevRW = 0, prevRH = 0;

let t = 0;

function frame() {
  requestAnimationFrame(frame);
  t += 0.0025;

  const SCL = 4;
  const RW  = Math.ceil(W / SCL);
  const RH  = Math.ceil(H / SCL);

  if (RW !== prevRW || RH !== prevRH) {
    off.width  = RW;
    off.height = RH;
    imgData    = octx.createImageData(RW, RH);
    prevRW = RW; prevRH = RH;
  }

  const CX   = RW / 2;
  const CY   = RH / 2;
  const BASE = Math.min(RW, RH);

  const NP = NUCLEI.map(n => ({
    x:  Math.cos(t * n.os + n.ph) * n.or * n.oe,
    y:  Math.sin(t * n.os * 1.29 + n.ph) * n.or,
    r2: n.r * n.r,
  }));

  const LP = LIGHTS.map(l => ({
    col: l.col,
    x:   Math.cos(t * l.os + l.ph) * l.or * l.oe,
    y:   Math.sin(t * l.sy * 1.41 + l.sph) * l.or,
  }));

  const data       = imgData.data;
  const THRESH     = 1.0;
  const A_START    = 0.65;

  for (let py = 0; py < RH; py++) {
    for (let px = 0; px < RW; px++) {
      const nx = (px - CX) / BASE;
      const ny = (py - CY) / BASE;

      let sum = 0;
      for (let i = 0; i < NP.length; i++) {
        const n  = NP[i];
        const dx = nx - n.x;
        const dy = ny - n.y;
        sum += n.r2 / (dx*dx + dy*dy + 8e-5);
      }

      const idx = (py * RW + px) << 2;

      if (sum < A_START) {
        data[idx + 3] = 0;
        continue;
      }

      const rawA  = (sum - A_START) / (THRESH - A_START);
      const clamp = Math.min(1.0, rawA);
      const alpha = clamp * clamp * (3 - 2 * clamp);

      const depth = Math.min(1.0, Math.max(0, (sum - THRESH) / (THRESH * 1.8)));

      let tr=0, tg=0, tb=0, tw=0;
      for (let i = 0; i < LP.length; i++) {
        const l  = LP[i];
        const dx = nx - l.x;
        const dy = ny - l.y;
        const w  = 1.0 / (dx*dx + dy*dy + 0.0025);
        tr += l.col[0] * w;
        tg += l.col[1] * w;
        tb += l.col[2] * w;
        tw += w;
      }
      tr /= tw; tg /= tw; tb /= tw;

      const cs = depth * 0.82;
      let r = 255 + (tr - 255) * cs;
      let g = 255 + (tg - 255) * cs;
      let b = 255 + (tb - 255) * cs;

      const hx  = -0.17, hy = -0.22;
      const hd2 = (nx - hx) * (nx - hx) + (ny - hy) * (ny - hy);
      const spec = Math.exp(-hd2 * 22) * 0.72;
      r = r + (255 - r) * spec;
      g = g + (255 - g) * spec;
      b = b + (255 - b) * spec;

      const rx  = 0.22, ry = 0.28;
      const rd2 = (nx - rx) * (nx - rx) + (ny - ry) * (ny - ry);
      const shd = Math.exp(-rd2 * 5.5) * 0.09;
      r *= (1 - shd);
      g *= (1 - shd);
      b *= (1 - shd);

      data[idx]     = r | 0;
      data[idx + 1] = g | 0;
      data[idx + 2] = b | 0;
      data[idx + 3] = (alpha * 255) | 0;
    }
  }

  octx.putImageData(imgData, 0, 0);

  ctx.fillStyle = '#F8F7F3';
  ctx.fillRect(0, 0, W, H);
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(off, 0, 0, W, H);
}

frame();
</script>
</body>
</html>
